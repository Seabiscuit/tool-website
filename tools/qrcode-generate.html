<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>二维码生成器 - 免费在线QR Code生成工具 | ToolBox</title>
<meta name="description" content="免费在线二维码生成器，支持URL、文本、名片等内容，可自定义尺寸和颜色，一键下载二维码图片。">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="../index.html" class="logo">
      <span class="logo-icon">🔧</span>
      <span>ToolBox</span>
    </a>
    <nav>
      <button class="nav-toggle" aria-label="菜单"><span></span><span></span><span></span></button>
      <ul class="nav-links">
        <li><a href="../index.html">首页</a></li>
        <li><a href="../about.html">关于我们</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="container">
  <div class="ad-slot ad-top">📢 广告位招租 — 顶部横幅 960×90 | ads@toolbox-demo.com</div>
</div>

<section class="tool-header">
  <div class="container">
    <h1>📱 二维码生成器</h1>
    <p>快速生成二维码，支持自定义尺寸与颜色，一键下载</p>
  </div>
</section>

<div class="container with-sidebar">
  <main>
    <div class="tool-workspace">
      <div class="control-row">
        <label style="width:80px;">内容类型:</label>
        <select id="qrType" style="width:auto;">
          <option value="url">网址链接</option>
          <option value="text">文本内容</option>
          <option value="email">邮箱地址</option>
          <option value="phone">电话号码</option>
          <option value="wifi">WiFi信息</option>
        </select>
      </div>

      <div id="qrInputs">
        <textarea id="qrContent" placeholder="请输入要生成二维码的内容..." style="min-height:100px;"></textarea>
      </div>

      <div class="control-row" style="margin-top:12px;">
        <label>尺寸:</label>
        <select id="qrSize" style="width:auto;">
          <option value="200">200×200</option>
          <option value="256" selected>256×256</option>
          <option value="300">300×300</option>
          <option value="400">400×400</option>
          <option value="512">512×512 (高清)</option>
        </select>

        <label>前景色:</label>
        <input type="color" id="qrFg" value="#000000" style="width:44px;height:36px;padding:2px;">

        <label>背景色:</label>
        <input type="color" id="qrBg" value="#ffffff" style="width:44px;height:36px;padding:2px;">

        <button class="btn btn-primary" id="generateBtn">生成二维码</button>
      </div>

      <div id="qrResult" style="text-align:center;margin-top:20px;display:none;">
        <div id="qrCanvas" style="display:inline-block;padding:16px;background:#fff;border-radius:8px;border:1px solid var(--border);"></div>
        <div class="control-row" style="justify-content:center;margin-top:14px;">
          <button class="btn btn-outline" id="downloadQr">下载PNG</button>
          <button class="btn btn-outline" id="downloadSvg">下载SVG</button>
          <button class="btn btn-gold btn-sm" id="hdQrBtn">高清矢量导出 (PRO)</button>
        </div>
      </div>

      <div id="qrPlaceholder" style="text-align:center;padding:40px;color:var(--text-light);">
        <div style="font-size:3rem;">📱</div>
        <p>输入内容后点击生成</p>
      </div>

      <p style="font-size:0.78rem;color:var(--text-light);margin-top:12px;">
        ⚠ 二维码在浏览器本地生成，内容不会上传。高清矢量导出为PRO会员专属功能。
      </p>
    </div>
  </main>

  <aside>
    <div class="ad-slot ad-sidebar">📢 广告位招租<br>侧边栏 300×250<br>ads@toolbox-demo.com</div>
  </aside>
</div>

<div class="container">
  <div class="ad-slot ad-bottom">📢 广告位招租 — 底部横幅 960×90 | ads@toolbox-demo.com</div>
</div>

<footer class="site-footer">
  <div class="container">
    <p>© 2026 ToolBox. | <a href="../about.html">关于我们</a></p>
  </div>
</footer>

<script src="../js/main.js"></script>
<!-- QRCode.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
(function() {
  var qrPlaceholder = document.getElementById('qrPlaceholder');
  var qrResult = document.getElementById('qrResult');
  var qrCanvas = document.getElementById('qrCanvas');
  var qrContent = document.getElementById('qrContent');
  var qrSize = document.getElementById('qrSize');
  var qrFg = document.getElementById('qrFg');
  var qrBg = document.getElementById('qrBg');
  var generateBtn = document.getElementById('generateBtn');
  var downloadQr = document.getElementById('downloadQr');
  var downloadSvg = document.getElementById('downloadSvg');
  var hdQrBtn = document.getElementById('hdQrBtn');
  var qrType = document.getElementById('qrType');

  var currentQrData = '';

  qrType.addEventListener('change', function() {
    var t = this.value;
    var hints = {url:'https://example.com',text:'输入任意文本',email:'mailto:name@example.com',phone:'tel:+8613800000000',wifi:'WIFI:S:MyWiFi;T:WPA;P:password;;'};
    qrContent.placeholder = '请输入' + {url:'网址链接',text:'文本内容',email:'邮箱地址',phone:'电话号码',wifi:'WiFi信息'}[t] + '... 例如: ' + hints[t];
    qrContent.value = '';
  });
  qrType.dispatchEvent(new Event('change'));

  generateBtn.addEventListener('click', function() {
    var content = qrContent.value.trim();
    if (!content) { showToast('请输入内容'); return; }

    var type = qrType.value;
    var prefixes = {email:'mailto:',phone:'tel:'};
    if (prefixes[type] && !content.startsWith(prefixes[type])) {
      content = prefixes[type] + content;
    }

    currentQrData = content;
    var size = parseInt(qrSize.value);
    qrCanvas.innerHTML = '';
    qrPlaceholder.style.display = 'none';
    qrResult.style.display = '';

    try {
      new QRCode(qrCanvas, {
        text: content,
        width: size,
        height: size,
        colorDark: qrFg.value,
        colorLight: qrBg.value,
        correctLevel: QRCode.CorrectLevel.M
      });
      showToast('二维码已生成');
    } catch(e) {
      showToast('生成失败，请检查内容');
    }
  });

  downloadQr.addEventListener('click', function() {
    var img = qrCanvas.querySelector('img');
    if (!img) { showToast('请先生成二维码'); return; }
    var a = document.createElement('a');
    a.href = img.src;
    a.download = 'qrcode.png';
    a.click();
  });

  downloadSvg.addEventListener('click', function() {
    showPremiumModal('SVG矢量导出');
  });

  hdQrBtn.addEventListener('click', function() {
    showPremiumModal('高清矢量导出');
  });
})();
</script>
</body>
</html>
