<script src="../js/main.js"></script>
<script>
(function() {
  var jsonInput = document.getElementById('jsonInput');
  var jsonOutput = document.getElementById('jsonOutput');
  var jsonMsg = document.getElementById('jsonMsg');
  var indentSize = document.getElementById('indentSize');

  function showMsg(msg, isError) {
    jsonMsg.innerHTML = msg;
    jsonMsg.style.color = isError ? '#e74c3c' : '#27ae60';
  }

  function tryParse() {
    try { return JSON.parse(jsonInput.value); }
    catch(e) { return null; }
  }

  document.getElementById('formatBtn').addEventListener('click', function() {
    var obj = tryParse();
    if (obj === null) { showMsg('❌ JSON格式错误，请检查', true); return; }
    jsonOutput.value = JSON.stringify(obj, null, parseInt(indentSize.value));
    showMsg('✅ 格式化成功', false);
  });

  document.getElementById('compressBtn').addEventListener('click', function() {
    var obj = tryParse();
    if (obj === null) { showMsg('❌ JSON格式错误，请检查', true); return; }
    jsonOutput.value = JSON.stringify(obj);
    showMsg('✅ 压缩成功，大小: ' + formatSize(new Blob([jsonOutput.value]).size), false);
  });

  document.getElementById('validateBtn').addEventListener('click', function() {
    var obj = tryParse();
    if (obj === null) {
      try { JSON.parse(jsonInput.value); } catch(e) {
        showMsg('❌ 校验失败: ' + e.message, true);
        return;
      }
    }
    var count = obj ? Object.keys(obj).length : 0;
    showMsg('✅ JSON有效' + (obj && typeof obj === 'object' ? ' | 顶层键数: ' + count : ''), false);
  });

  document.getElementById('copyJsonBtn').addEventListener('click', function() {
    copyResult(jsonOutput);
  });

  document.getElementById('downloadJsonBtn').addEventListener('click', function() {
    var text = jsonOutput.value.trim();
    if (!text) { showToast('没有可下载的内容'); return; }
    var blob = new Blob([text], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'formatted.json';
    a.click();
    showToast('已下载');
  });

  document.getElementById('clearJsonBtn').addEventListener('click', function() {
    jsonInput.value = '';
    jsonOutput.value = '';
    jsonMsg.innerHTML = '';
  });

  // Auto-format on input (debounced)
  var timer;
  jsonInput.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(function() {
      var obj = tryParse();
      if (obj !== null) {
        jsonOutput.value = JSON.stringify(obj, null, parseInt(indentSize.value));
        showMsg('✅ JSON有效', false);
      } else if (jsonInput.value.trim() === '') {
        jsonOutput.value = '';
        jsonMsg.innerHTML = '';
      } else {
        showMsg('⚠ JSON格式错误 (输入中...)', true);
      }
    }, 400);
  });

  indentSize.addEventListener('change', function() {
    var obj = tryParse();
    if (obj !== null) {
      jsonOutput.value = JSON.stringify(obj, null, parseInt(indentSize.value));
    }
  });
})();
</script>
